<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>Diet Planner</h1>
            <p class="subtitle">Get your personalized BMI and diet plan</p>

            <form id="dietForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" required placeholder="Enter your name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" required placeholder="Years" min="1" max="120">
                    </div>

                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" required placeholder="kg" min="1" step="0.1">
                    </div>

                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" required placeholder="cm" min="1" step="0.1">
                    </div>
                </div>

                <div class="form-group">
                    <label for="goal">Goal</label>
                    <div class="select-wrapper">
                        <select id="goal" required>
                            <option value="" disabled selected>Select your goal</option>
                            <option value="lose">Weight Loss</option>
                            <option value="gain">Weight Gain</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn">Generate Plan</button>
            </form>

            <div id="result" class="result-section hidden">
                <h2>Your Results</h2>
                <div class="result-card">
                    <div class="result-row">
                        <span class="label">Name:</span>
                        <span id="outName" class="value"></span>
                    </div>
                    <div class="result-row">
                        <span class="label">BMI:</span>
                        <span id="outBMI" class="value font-bold"></span>
                    </div>
                    <div class="result-row">
                        <span class="label">Category:</span>
                        <span id="outCategory" class="badge"></span>
                    </div>
                </div>

                <div class="diet-plan">
                    <h3>Recommended Diet Plan</h3>
                    <ul id="outDiet">
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
